# ─── GitLab Copilot Reviewer CI ──────────────────────────────────────────────
#
# This pipeline runs in the *reviewer* project and is triggered directly
# by GitLab webhooks via a Pipeline Trigger URL.
#
# The webhook payload is automatically available as $TRIGGER_PAYLOAD
# (file-type variable). The review script reads it to extract MR metadata.
#
# See: https://docs.gitlab.com/ci/triggers/#use-a-webhook
#
# Required CI/CD variables (set in Settings → CI/CD → Variables):
#   GITLAB_TOKEN        – Access token with api scope (masked)
#   GITLAB_BOT_USERNAME – Service account username
#   GITHUB_TOKEN        – GitHub PAT with Copilot access (masked)
#
# Note: CI_SERVER_URL (GitLab instance URL) is automatically available
#
# Optional:
#   COPILOT_MODEL       – Model override (default: gpt-4.1)
#
# MCP configuration:
#   mcp.json in repo root is loaded automatically by the reviewer.
#   This project ships mcp.json with a Serena server entry (uvx).

stages:
  - build-image
  - review

default:
  tags:
    - scm-aws

variables:
  REVIEWER_IMAGE: "$CI_REGISTRY_IMAGE/reviewer"

build-reviewer-image:
  stage: build-image
  image: docker:27
  services:
    - docker:27-dind
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
  rules:
    - if: $CI_PIPELINE_SOURCE == "push"
      when: on_success
    - if: $CI_PIPELINE_SOURCE == "web"
      when: manual
    - when: never
  script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin "$CI_REGISTRY"
    - docker build -f Dockerfile.reviewer -t "$REVIEWER_IMAGE:$CI_COMMIT_SHA" -t "$REVIEWER_IMAGE:latest" .
    - docker push "$REVIEWER_IMAGE:$CI_COMMIT_SHA"
    - docker push "$REVIEWER_IMAGE:latest"

copilot-review:
  stage: review
  image:
    name: "$REVIEWER_IMAGE:latest"
  variables:
    COPILOT_CONFIG_DIR: "$CI_PROJECT_DIR/.copilot-sessions"
    GIT_STRATEGY: fetch

  cache:
    key: "copilot-sessions-$CI_PROJECT_ID"
    paths:
      - .copilot-sessions/
    policy: pull-push

  # Only run when triggered via the Pipeline Trigger API (webhook or manual)
  rules:
    - if: $CI_PIPELINE_SOURCE == "trigger"
      when: always
    - when: never

  before_script:
    # Ensure persistent Copilot session directory exists
    - mkdir -p "$COPILOT_CONFIG_DIR"
    - node --version
    - uvx --version

  script:
    - node /opt/reviewer/dist/index.mjs

  timeout: 10m

  # Allow the job to fail without blocking other pipelines
  allow_failure: true
