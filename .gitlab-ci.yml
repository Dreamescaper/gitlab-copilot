# ─── GitLab Copilot Reviewer CI ──────────────────────────────────────────────
#
# This pipeline runs in the *reviewer* project and is triggered directly
# by GitLab webhooks via a Pipeline Trigger URL.
#
# The webhook payload is automatically available as $TRIGGER_PAYLOAD
# (file-type variable). The review script reads it to extract MR metadata.
#
# See: https://docs.gitlab.com/ci/triggers/#use-a-webhook
#
# Required CI/CD variables (set in Settings → CI/CD → Variables):
#   GITLAB_TOKEN        – Access token with api scope (masked)
#   GITLAB_BOT_USERNAME – Service account username
#   GITHUB_TOKEN        – GitHub PAT with Copilot access (masked)
#
# Note: CI_SERVER_URL (GitLab instance URL) is automatically available
#
# Optional:
#   COPILOT_MODEL       – Model override (default: gpt-4.1)

stages:
  - review

copilot-review:
  stage: review
  image: node:24-slim

  # Only run when triggered via the Pipeline Trigger API (webhook or manual)
  rules:
    - if: $CI_PIPELINE_SOURCE == "trigger"
      when: always
    - when: never

  variables:
    # CI_SERVER_URL is automatically available (predefined variable)
    GITLAB_TOKEN: $GITLAB_TOKEN
    GITLAB_BOT_USERNAME: $GITLAB_BOT_USERNAME
    GITHUB_TOKEN: $GITHUB_TOKEN
    COPILOT_MODEL: $COPILOT_MODEL

  before_script:
    # Install git (needed to clone the target repo)
    - apt-get update -qq && apt-get install -y -qq git >/dev/null 2>&1
    # Install project dependencies
    - npm ci --ignore-scripts --silent 2>&1 | tail -1

  script:
    - node dist/index.mjs

  timeout: 30m

  # Allow the job to fail without blocking other pipelines
  allow_failure: true
